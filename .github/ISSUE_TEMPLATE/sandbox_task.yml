name: "🏗️ Sandkasten-Update"
description: "Neue Snippets, Workarounds oder Referenz-Dateien einreichen"
title: "[SANDBOX] "
labels: ["Sandkasten & Snippets"]
body:
  - type: dropdown
    id: type
    attributes:
      label: "Art des Eintrags"
      options:
        - "Lua Snippet (Funktion)"
        - "XML-Kopie (Vanilla)"
        - "Dokumentation (Markdown)"
        - "Asset (Sound/Mesh)"
        - "Andere Art / Sonstiges"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Beschreibung"
      placeholder: "Was ist das Ziel dieses Snippets?"
    validations:
      required: true
...
