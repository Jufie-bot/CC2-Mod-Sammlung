name: "🔬 Forschungs-Aufgabe / Analyse"
description: "Spezifische Engine-Komponente oder Mod dekonstruieren"
title: "[RESEARCH] "
labels: ["Typ: Forschung & Analyse"]
body:
  - type: dropdown
    id: category
    attributes:
      label: "Analyse-Fokus"
      options:
        - "Waffen & Geschütze"
        - "Fahrzeuge & Einheiten"
        - "KI & Skynet-Logik"
        - "Audio-System"
        - "UI / HUD / Monitore"
        - "Physik & Balancing"
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: "Ziel der Analyse"
      placeholder: "Was genau wollen wir herausfinden?"
    validations:
      required: true

  - type: textarea
    id: reference_files
    attributes:
      label: "Referenz-Dateien"
      placeholder: "z.B. vanilla-referenz/lua/library_vehicle_manager.lua"

  - type: textarea
    id: hypotheses
    attributes:
      label: "Hypothesen / Vermutungen"
      placeholder: "Ich vermute, der Parameter X steuert das Verhalten Y..."
