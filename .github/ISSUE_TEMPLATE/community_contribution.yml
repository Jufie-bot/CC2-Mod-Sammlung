name: "🤝 Externer Community-Beitrag"
description: "Vorschlag, Analyse oder Fehlerbericht von einem Gast-Entwickler"
title: "[COMMUNITY] "
labels: ["Guter Einstieg"]
body:
  - type: textarea
    id: contribution
    attributes:
      label: "Dein Beitrag / Vorschlag"
      placeholder: "Was möchtest du mit dem Labor teilen?"
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: "Art des Beitrags"
      options:
        - "Fehlermeldung"
        - "Verbesserungsvorschlag"
        - "Neue Analyse-Idee"
        - "Wiki-Ergänzung"
    validations:
      required: true
