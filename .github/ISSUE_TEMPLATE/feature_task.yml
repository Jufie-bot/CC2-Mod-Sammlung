name: "✨ Neue Funktion / Verbesserung"
description: "Vorschlag für neue Features oder Optimierungen"
title: "[FEAT] "
labels: ["Typ: Mod-Feature"]
body:
  - type: dropdown
    id: target
    attributes:
      label: "Ziel-Projekt / Mod"
      options:
        - "Skynet V4 + Extras"
        - "Wiki & Dokumentation"
        - "Sandkasten (neues Snippet)"
        - "Allgemeine Labor-Funktion"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Feature-Konzept"
      description: "Was soll das neue Feature bewirken?"
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: "Technischer Ansatz"
      placeholder: "Welche Lua-Hooks oder XML-Parameter sollen verwendet werden?"

  - type: dropdown
    id: complexity
    attributes:
      label: "Geschätzter Aufwand"
      options:
        - "Niedrig (Quick Fix / Kleine Änderung)"
        - "Mittel (Neue Logik-Ebene)"
        - "Hoch (Komplexe System-Änderung)"
