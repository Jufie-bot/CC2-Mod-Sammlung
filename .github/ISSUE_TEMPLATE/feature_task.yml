name: "✨ Feature-Task (Eigene Mod)"
description: "Neue Funktion oder Verbesserung für eine eigene Mod"
labels: ["enhancement"]
body:
  - type: input
    id: mod_project
    attributes:
      label: "Mod-Projekt"
      placeholder: "z.B. meine-mod"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Feature-Beschreibung"
      placeholder: "Was soll der neue Feature können?"
    validations:
      required: true

  - type: textarea
    id: technical
    attributes:
      label: "Technischer Ansatz"
      description: "Welche Dateien, Hooks oder Parameter sind betroffen?"
      placeholder: "z.B. library_custom_hud.lua, screen_vehicle_control.lua"

  - type: dropdown
    id: bereich
    attributes:
      label: "Bereich"
      options:
        - "Code"
        - "UX/UI"
        - "Audio"
        - "Konzept"
        - "Release"
