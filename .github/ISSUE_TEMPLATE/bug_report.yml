name: "🐞 Bug / Fehler melden"
description: "Fehler in einer Mod, im Wiki oder in der Automatisierung melden"
title: "[BUG] "
labels: ["Typ: Bug / Fix"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "Betroffener Bereich / Mod"
      options:
        - "Skynet V4 + Extras"
        - "Wiki & Dokumentation"
        - "Automatisierung (Python/Actions)"
        - "Sandkasten & Snippets"
        - "Global / Game Engine"
        - "Sonstiges / Andere"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Fehlerbeschreibung"
      placeholder: "Was genau funktioniert nicht wie erwartet?"
    validations:
      required: true
...
