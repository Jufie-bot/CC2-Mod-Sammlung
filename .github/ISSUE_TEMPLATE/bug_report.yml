name: "🐞 Bug / Fehler melden"
description: "Fehler in einer Mod, im Wiki oder in der Automatisierung melden"
title: "[BUG] "
labels: ["Typ: Bug / Fix"]
body:
  - type: dropdown
    id: area
    attributes:
      label: "Betroffener Bereich / Mod"
      options:
        - "Skynet V4 + Extras"
        - "Wiki & Dokumentation"
        - "Automatisierung (Python/Actions)"
        - "Sandkasten & Snippets"
        - "Global / Game Engine"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: "Fehlerbeschreibung"
      placeholder: "Was genau funktioniert nicht wie erwartet?"
    validations:
      required: true

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: "Erwartetes vs. Tatsächliches Verhalten"
      placeholder: "Soll-Zustand vs. Ist-Zustand"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: "Schritte zum Reproduzieren"
      placeholder: "1. Spiel starten\n2. Schiff X spawnen\n3. ..."

  - type: input
    id: file_path
    attributes:
      label: "Betroffene Datei / Zeile"
      placeholder: "z.B. eigene-mods/Skynet V4 + Extras/content/scripts/..."
