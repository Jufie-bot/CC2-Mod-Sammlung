name: "📚 Wiki-Inhalt erstellen / ergänzen"
description: "Neue Guides oder Referenz-Seiten für das Wiki planen"
title: "[WIKI] "
labels: ["Wiki & Doku"]
body:
  - type: dropdown
    id: category
    attributes:
      label: "Wiki-Kategorie"
      options:
        - "Fundament (Grundlagen)"
        - "Game-Referenz (XML/Lua)"
        - "Mod-Galerie"
        - "Guides & Tutorials"
        - "Community-Bereich"
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: "Geplanter Inhalt"
      placeholder: "Welches Thema soll dokumentiert werden?"
    validations:
      required: true

  - type: textarea
    id: sources
    attributes:
      label: "Informationsquellen"
      placeholder: "Forschungsberichte, Vanilla-Dateien oder Labor-Tests"
