name: Sync Wiki

on:
  push:
    branches: [auf-GitHub]
    paths:
      - 'wiki/**'
  workflow_dispatch:

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Sync wiki/ to GitHub Wiki
      run: |
        # Wiki-Repo klonen
        git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git wiki_repo

        # Alles aus wiki/ ins Wiki-Repo kopieren
        # Dateien die bereits im Root liegen, direkt kopieren
        cp -f wiki/_Sidebar.md wiki_repo/_Sidebar.md 2>/dev/null || true
        cp -f wiki/Home.md wiki_repo/Home.md 2>/dev/null || true
        cp -f wiki/labels.md wiki_repo/labels.md 2>/dev/null || true

        # Alle Unterordner-Dateien kopieren
        rsync -av --delete --exclude='.git' --exclude='PULL_REQUEST_TEMPLATE.md' wiki/ wiki_repo/

        # Commit und Push ins Wiki-Repo
        cd wiki_repo
        git config user.email "action@github.com"
        git config user.name "Wiki Sync Bot"
        git add -A
        if git diff --staged --quiet; then
          echo "Keine Aenderungen im Wiki."
        else
          git commit -m "auto-sync: wiki/ aus Hauptrepo"
          git push
          echo "Wiki aktualisiert."
        fi
