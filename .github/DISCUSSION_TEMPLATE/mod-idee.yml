title: "[Idee] "
labels: []
body:
  - type: dropdown
    id: category
    attributes:
      label: "Kategorie"
      options:
        - "Audio"
        - "UI / HUD"
        - "Gameplay"
        - "Waffen"
        - "Fahrzeuge"
        - "Kategorienübergreifend"
        - "KI / Skynet"
        - "Sonstiges"
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: "Mod-Idee"
      description: "Beschreibe die Idee — was soll die Mod können?"
    validations:
      required: true

  - type: textarea
    id: feasibility
    attributes:
      label: "Technische Machbarkeit"
      description: "Hast du bereits recherchiert, ob das technisch umsetzbar ist?"
