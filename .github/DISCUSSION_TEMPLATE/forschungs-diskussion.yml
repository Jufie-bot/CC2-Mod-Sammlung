title: "[Forschung] "
body:
  - type: dropdown
    id: category
    attributes:
      label: "Bereich"
      options:
        - "Audio"
        - "UI / HUD"
        - "Gameplay"
        - "Waffen"
        - "Fahrzeuge"
        - "KI / Skynet"
        - "Physik"
        - "Lua"
        - "Constants"
        - "Meshes"
        - "Texturen"
    validations:
      required: true

  - type: textarea
    id: finding
    attributes:
      label: "Forschungsergebnis / These"
      description: "Was wurde herausgefunden oder vermutet?"
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: "Belege / Code-Beispiele"
      description: "XML, Lua, Parameter-Werte oder In-Game-Beobachtungen"
      render: xml

  - type: textarea
    id: open_questions
    attributes:
      label: "Offene Fragen"
      description: "Was ist noch unklar oder muss noch getestet werden?"
